<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino Web Bluetooth Potmeter + RGB LED</title>
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div id="app">
        <div id="not-supported">
            <p>⚠️ Web Bluetooth is not supported in this browser.</p>
            <p>Please use Chrome, Edge, or Opera on desktop, or Chrome on Android.</p>
        </div>
        <div id="supported">
            <div id="not-connected">
                <button id="connectButton">Connect to BLE Device</button>
                <p class="status disconnected">Not connected</p>
            </div>
            <div id="connected">
                <div class="connection-overlay">
                    <button id="disconnectButton">Disconnect</button>
                    <p class="status connected">✓ Connected to <span id="deviceName"></span></p>
                </div>

                <div id="notifications" class="hidden-logic" aria-hidden="true">
                    <p><em>Waiting for notifications...</em></p>
                </div>

                <div class="hidden-logic" aria-hidden="true">
                    <div class="slider-group">
                        <label for="r">Red</label>
                        <input type="range" min="0" max="255" value="0" id="r">
                        <div class="slider-value" id="rValue">0</div>
                    </div>
                    <div class="slider-group">
                        <label for="g">Green</label>
                        <input type="range" min="0" max="255" value="0" id="g">
                        <div class="slider-value" id="gValue">0</div>
                    </div>
                    <div class="slider-group">
                        <label for="b">Blue</label>
                        <input type="range" min="0" max="255" value="0" id="b">
                        <div class="slider-value" id="bValue">0</div>
                    </div>
                    <div id="colorPreview" class="color-preview" style="background-color: rgb(0, 0, 0);"></div>
                </div>

                <div class="game-stage">
                    <img src="assets/Balloon.svg" alt="Balloon Control">
                </div>

                <div class="hud" aria-live="polite">
                    <span class="time">Time: 00:00</span>
                    <span class="best">Best time: 00:00</span>
                    <div class="lives">❤️ ❤️ ❤️</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/connection.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/balloon-speed-sync.js"></script>
    <script type="module" src="js/rgb-control.js"></script>
    <script type="module" src="js/balloon-control.js"></script>
</body>

</html>
